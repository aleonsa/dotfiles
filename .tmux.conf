# enable mouse usage
set -g mouse on
# --------- PLUGINS -------------

# tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'
# tmux autoreload
set -g @plugin 'b0o/tmux-autoreload'
# tmux-git-autofetch
set -g @plugin 'thepante/tmux-git-autofetch'
# tmux menus
set -g @plugin 'jaclu/tmux-menus'
# tmux continuum
set -g @plugin 'tmux-plugins/tmux-continuum'
# tmux fzf
set -g @plugin 'sainnhe/tmux-fzf'
# extrakto
set -g @plugin 'laktak/extrakto'
# simple-git-status
set -g @plugin 'kristijanhusak/tmux-simple-git-status'
# tmux-battery
set -g @plugin 'tmux-plugins/tmux-battery'
# tmux-mem-cpu-load
set -g @plugin 'thewtex/tmux-mem-cpu-load'
# tmux-cpu
set -g @plugin 'tmux-plugins/tmux-cpu'
# tmux-online-status
set -g @plugin 'tmux-plugins/tmux-online-status'
# catppuccin
set -g @plugin 'catppuccin/tmux'
# --------------------------------

# Configure Catppuccin
set -g @catppuccin_flavor "macchiato" # latte, macchiato, frappe, mocha
# set -g @catppuccin_status_background "none"
# set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Configure Online
set -g @online_icon "ok"
set -g @offline_icon "nok"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold] Ņ»ł #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}] Ņ»ł #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]Ōöé"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}] Ņ¬ģ #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]Ōöé"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}] Ņ½Ę #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,Ōöé,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag, ŅŁ┐ zoom ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#{?#{e|>=:10,#{cpu_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=#{@thm_bg},fg=#{@thm_pink}]}} ¾░śÜ #{cpu_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]Ōöé"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_green}] ¾░Źø #{ram_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]Ōöé"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] ¾░Ł” %Y-%m-%d ¾░ģÉ %H:%M "

# bootstrap tpm
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Configure Tmux
set -g status-position bottom
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# pane border look and feel
setw -g pane-border-status bottom
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format ""
set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]Ōöé"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
